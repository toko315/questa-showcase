<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QueStA Edu — App Collection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>QueStA Edu — App Collection</h1>
      <div class="lang-bar">
        <button class="lang-btn" data-lang="ja">日本語</button>
        <button class="lang-btn active" data-lang="en">English</button>
        <button class="lang-btn" data-lang="fr">Français</button>
      </div>
    </div>
  </header>

  <main>
    <section class="map-section">
      <img id="map-img" src="images/slide/en.png" alt="QueStA App Map" />
    </section>

    <section class="icons-section">
      <div id="icon-grid" class="icon-grid"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 QueStA Edu &nbsp;|&nbsp; <a href="https://www.questaedu.com" target="_blank" rel="noopener">www.questaedu.com</a></p>
  </footer>

  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <button class="modal-close" aria-label="Close">&times;</button>
      <div id="modal-content" class="modal-content"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
